
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" href="estilos.css">

    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js" integrity="sha384-q2kxQ16AaE6UbzuKqyBE9/u/KzioAlnx2maXQHiDX9d4/zp8Ok3f+M7DPm+Ib6IU" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">

</head>
<body>
    <div class="contenedor">
        <p>¿Quieres der mi enamorada?</p>
        <div>         
        </div>      
        <button id="yesBtn"  class="" data-bs-toggle="modal" data-bs-target="#exampleModal">SI</button>
        <button id="noBtn">NO</button>
        <div class="modal fade modalHola" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    <h5 class="modal-title" id="exampleModalLabel">Gracias por decir que Sí</h5>
                </div>
                <div class="modal-body">
                    <img src="Imagenes/ed5bda95-f1da-45d4-a4dd-ef2754d9027e.jpg">
                </div>
                <div class="cerrar">
                        <button type="button" data-bs-dismiss="modal"><i class="fas fa-times"></i></button>
                </div>
            </div>
            </div>
        </div>       
    </div>
    <footer>
        Copyright  © 2022 Yordi Alcantara Paico
    </footer>
    <script>
        const yesBtn = document.querySelector('#yesBtn');
        yesBtn.addEventListener('click',function () {
            document.getElementById('noBtn').style.background = 'transparent';
            document.getElementById('noBtn').style.boxShadow = 'none';
            document.getElementById('noBtn').style.color = 'transparent';
        });
        const noBtn = document.querySelector('#noBtn');
        noBtn.addEventListener('mouseover', function () {
            const randomX = parseInt(Math.random()*100);
            const randomY = parseInt(Math.random()*100);
            noBtn.style.setProperty('top',randomY+'%');
            noBtn.style.setProperty('left',randomX+'%');
            noBtn.style.setProperty('transform',`translate(-${randomX}%,-${randomY}%)`);
        })
    </script>
    
</body>
</html>
